name: CI

# Runs the unit tests and a syntax check on every pull request (and on pushes to
# main) so broken code can't merge. No secrets, no network calls to paid APIs —
# the tests cover pure functions only.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'   # match the scanner runtime used in scan.yml

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Syntax-check all API, scanner, and batch files
        run: |
          set -e
          for f in api/*.js scanner/*.mjs scanner/sources/*.mjs batch/*.mjs; do
            echo "checking $f"
            node --check "$f"
          done
